<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朋友圈照片分析人物性格</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #111827;
    min-height: 100vh;
    color: #e5e7eb;
    overflow-x: hidden;
}
.particles-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
}
.particle {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(168, 85, 247, 0.8) 0%, rgba(168, 85, 247, 0) 70%);
    animation: float 15s infinite ease-in-out;
}
.particle:nth-child(1) {
    width: 80px;
    height: 80px;
    left: 10%;
    top: 20%;
    animation-delay: 0s;
    animation-duration: 20s;
}
.particle:nth-child(2) {
    width: 120px;
    height: 120px;
    left: 70%;
    top: 10%;
    animation-delay: 2s;
    animation-duration: 25s;
}
.particle:nth-child(3) {
    width: 60px;
    height: 60px;
    left: 40%;
    top: 60%;
    animation-delay: 4s;
    animation-duration: 18s;
}
.particle:nth-child(4) {
    width: 100px;
    height: 100px;
    left: 85%;
    top: 50%;
    animation-delay: 1s;
    animation-duration: 22s;
}
.particle:nth-child(5) {
    width: 70px;
    height: 70px;
    left: 20%;
    top: 80%;
    animation-delay: 3s;
    animation-duration: 19s;
}
.particle:nth-child(6) {
    width: 90px;
    height: 90px;
    left: 60%;
    top: 75%;
    animation-delay: 5s;
    animation-duration: 24s;
}
.particle:nth-child(7) {
    width: 50px;
    height: 50px;
    left: 5%;
    top: 45%;
    animation-delay: 2.5s;
    animation-duration: 16s;
}
.particle:nth-child(8) {
    width: 110px;
    height: 110px;
    left: 90%;
    top: 25%;
    animation-delay: 4.5s;
    animation-duration: 23s;
}
.particle:nth-child(9) {
    width: 65px;
    height: 65px;
    left: 35%;
    top: 35%;
    animation-delay: 1.5s;
    animation-duration: 17s;
}
.particle:nth-child(10) {
    width: 85px;
    height: 85px;
    left: 75%;
    top: 85%;
    animation-delay: 3.5s;
    animation-duration: 21s;
}
@keyframes float {
    0%, 100% {
        transform: translate(0, 0) scale(1);
        opacity: 0.3;
    }
    25% {
        transform: translate(50px, -50px) scale(1.1);
        opacity: 0.6;
    }
    50% {
        transform: translate(-30px, 30px) scale(0.9);
        opacity: 0.4;
    }
    75% {
        transform: translate(-50px, -30px) scale(1.05);
        opacity: 0.5;
    }
}
.hidden {
    display: none !important;
}
.homepage {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    z-index: 10;
}
.header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeInDown 1s ease-out;
}
@keyframes fadeInDown {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
@keyframes pulse {
    0%, 100% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.05);
    }
}
@keyframes shimmer {
    0% {
        background-position: -200% 0;
    }
    100% {
        background-position: 200% 0;
    }
}
.logo-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    animation: pulse 3s infinite ease-in-out;
}
.logo-icon {
    width: 40px;
    height: 40px;
    color: #a855f7;
}
.title {
    font-size: 28px;
    font-weight: bold;
    color: #a855f7;
    background: linear-gradient(90deg, #a855f7, #ec4899, #a855f7);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
}
@media (min-width: 768px) {
    .title {
        font-size: 36px;
    }
}
.upload-area {
    width: 100%;
    max-width: 400px;
    min-height: 320px;
    border: 2px dashed #7c3aed;
    border-radius: 24px;
    background: #4c1d95;
    padding: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.4s ease;
    margin-bottom: 48px;
    animation: fadeInUp 1s ease-out 0.3s both;
}
.upload-area:hover {
    border-color: #a855f7;
    border-style: solid;
    background: #5b21b6;
    box-shadow: 0 10px 40px rgba(168, 85, 247, 0.3);
}
.upload-area.drag-over {
    border-color: #c4b5fd;
    border-style: solid;
}
.upload-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
}
.upload-icon {
    width: 80px;
    height: 80px;
    color: #a855f7;
    margin-bottom: 20px;
}
.upload-text {
    color: #e9d5ff;
    font-size: 20px;
    margin-bottom: 12px;
}
.upload-hint {
    color: #c4b5fd;
    font-size: 16px;
}
.file-input {
    display: none;
}
.preview-container {
    width: 100%;
}
.preview-wrapper {
    position: relative;
    width: 100%;
    height: 280px;
    border-radius: 16px;
    overflow: hidden;
    border: 2px solid #7c3aed;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}
.preview-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.remove-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #4c1d95;
    color: #e9d5ff;
    border: none;
    font-size: 32px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
}
.remove-btn:hover {
    background: #991b1b;
    color: #fca5a5;
}
.button-container {
    text-align: center;
    animation: fadeInUp 1s ease-out 0.6s both;
}
.analyze-btn {
    background: linear-gradient(135deg, #a855f7, #ec4899);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 20px 48px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.4s ease;
    box-shadow: 0 10px 30px rgba(168, 85, 247, 0.3);
}
.analyze-btn:hover:not(.disabled) {
    transform: scale(1.05);
    box-shadow: 0 15px 40px rgba(168, 85, 247, 0.4);
}
.analyze-btn:active:not(.disabled) {
    transform: scale(0.98);
}
.analyze-btn.disabled {
    background: #374151;
    color: #9ca3af;
    cursor: not-allowed;
    box-shadow: none;
}
.analyze-btn.loading {
    position: relative;
    padding-left: 50px;
}
.analyze-btn.loading::before {
    content: '';
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    border-top-color: white;
    animation: spin 1s ease-in-out infinite;
}
@keyframes spin {
    to {
        transform: translateY(-50%) rotate(360deg);
    }
}
.hint-text {
    color: #c4b5fd;
    font-size: 14px;
    margin-top: 20px;
}
.report-page {
    position: fixed;
    inset: 0;
    background: #111827;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    overflow-y: auto;
}
.report-header {
    width: 100%;
    max-width: 800px;
    margin-bottom: 48px;
    text-align: center;
}
.report-page.show {
    opacity: 1;
    transform: translateY(0);
}
.report-header {
    width: 100%;
    max-width: 800px;
    margin-bottom: 48px;
    text-align: center;
}
.report-title-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
}
.thumbnail-wrapper {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    overflow: hidden;
    border: 4px solid #a855f7;
    box-shadow: 0 5px 20px rgba(168, 85, 247, 0.4);
}
.thumbnail-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.report-title {
    font-size: 28px;
    font-weight: bold;
    color: #a855f7;
}
@media (min-width: 768px) {
    .report-title {
        font-size: 36px;
    }
}
.card {
    background: #4c1d95;
    border: 1px solid #7c3aed;
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 24px;
    transition: all 0.4s ease;
    opacity: 0;
    transform: translateY(20px);
}
.card.show {
    opacity: 1;
    transform: translateY(0);
}
.card:hover {
    box-shadow: 0 10px 40px rgba(168, 85, 247, 0.3);
}
@media (min-width: 768px) {
    .report-content {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
    }
    
    .card {
        margin-bottom: 0;
    }
}
.card-header {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
}
.card-icon {
    width: 40px;
    height: 40px;
    color: #a855f7;
    margin-right: 16px;
}
.card-title {
    font-size: 20px;
    font-weight: bold;
    color: #e9d5ff;
}
.card-type {
    color: #f3e8ff;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 12px;
}
.card-description {
    color: #c4b5fd;
    font-size: 16px;
    line-height: 1.6;
}
.report-buttons {
    width: 100%;
    max-width: 800px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
    margin-top: 32px;
}
@media (min-width: 768px) {
    .report-buttons {
        flex-direction: row;
        justify-content: center;
        gap: 24px;
    }
}
.report-btn {
    border-radius: 16px;
    padding: 16px 32px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.4s ease;
    min-width: 140px;
}
.report-btn.primary {
    background: #7c3aed;
    color: #e9d5ff;
    border: none;
}
.report-btn.primary:hover {
    background: #6d28d9;
    transform: scale(1.05);
    box-shadow: 0 10px 30px rgba(168, 85, 247, 0.4);
}
.report-btn.secondary {
    background: transparent;
    color: #a855f7;
    border: 2px solid #a855f7;
}
.report-btn.secondary:hover {
    background: #a855f7;
    color: #111827;
    transform: scale(1.05);
    box-shadow: 0 10px 30px rgba(168, 85, 247, 0.4);
}
.toast {
    position: fixed;
    top: 24px;
    right: 24px;
    background: #4c1d95;
    color: #e9d5ff;
    padding: 12px 24px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: 100;
}
.toast.show {
    opacity: 1;
}
    </style>
</head>
<body>
    <div class="particles-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    <div id="homepage" class="homepage">
        <div class="header">
            <div class="logo-container">
                <svg class="logo-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812-1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <h1 class="title">从朋友圈，读懂真实的自己</h1>
            </div>
        </div>
        <div id="upload-area" class="upload-area">
            <div id="upload-placeholder" class="upload-placeholder">
                <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
                <p class="upload-text">点击/拖拽上传照片</p>
                <p class="upload-hint">支持 JPG、PNG 格式</p>
                <input type="file" id="file-input" class="file-input" accept="image/*">
            </div>
            <div id="preview-container" class="preview-container hidden">
                <div class="preview-wrapper">
                    <img id="preview-image" class="preview-image" src="" alt="预览图">
                    <button id="remove-image" class="remove-btn">×</button>
                </div>
            </div>
        </div>
        <div class="button-container">
            <button id="analyze-button" class="analyze-btn disabled">开始分析</button>
            <p class="hint-text">仅前端模拟分析，不上传任何照片</p>
        </div>
    </div>
    <div id="report-page" class="report-page hidden">
        <div class="report-header">
            <div class="report-title-container">
                <div class="thumbnail-wrapper">
                    <img id="report-thumbnail" src="" alt="缩略图">
                </div>
                <h2 class="report-title">性格分析报告</h2>
            </div>
        </div>
        <div class="report-content">
            <div class="card">
                <div class="card-header">
                    <svg class="card-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                    <h3 class="card-title">社交倾向</h3>
                </div>
                <p id="social-tendency" class="card-type">外向</p>
                <p id="social-description" class="card-description">你喜欢与人交往，善于表达自己的想法和感受。</p>
            </div>
            <div class="card">
                <div class="card-header">
                    <svg class="card-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <h3 class="card-title">情绪特质</h3>
                </div>
                <p id="emotional-trait" class="card-type">乐观</p>
                <p id="emotional-description" class="card-description">你总是看到事情的积极一面，面对困难时保持乐观。</p>
            </div>
            <div class="card">
                <div class="card-header">
                    <svg class="card-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                    </svg>
                    <h3 class="card-title">兴趣偏好</h3>
                </div>
                <p id="interest-preference" class="card-type">文艺</p>
                <p id="interest-description" class="card-description">你对艺术和文化有着浓厚的兴趣，喜欢欣赏艺术。</p>
            </div>
        </div>
        <div class="report-buttons">
            <button id="download-button" class="report-btn secondary">下载报告</button>
            <button id="reanalyze-button" class="report-btn primary">重新分析</button>
            <button id="share-button" class="report-btn secondary">分享</button>
        </div>
    </div>
    <div id="toast" class="toast">操作成功</div>

    <script>
let uploadedImage = null;
const uploadArea = document.getElementById('upload-area');
const uploadPlaceholder = document.getElementById('upload-placeholder');
const fileInput = document.getElementById('file-input');
const previewContainer = document.getElementById('preview-container');
const previewImage = document.getElementById('preview-image');
const removeImage = document.getElementById('remove-image');
const analyzeButton = document.getElementById('analyze-button');
const homepage = document.getElementById('homepage');
const reportPage = document.getElementById('report-page');
const reportThumbnail = document.getElementById('report-thumbnail');
const socialTendency = document.getElementById('social-tendency');
const socialDescription = document.getElementById('social-description');
const emotionalTrait = document.getElementById('emotional-trait');
const emotionalDescription = document.getElementById('emotional-description');
const interestPreference = document.getElementById('interest-preference');
const interestDescription = document.getElementById('interest-description');
const downloadButton = document.getElementById('download-button');
const reanalyzeButton = document.getElementById('reanalyze-button');
const shareButton = document.getElementById('share-button');
const toast = document.getElementById('toast');
const personalityData = {
    social: [
        { type: '外向', description: '你喜欢与人交往，善于表达自己的想法和感受。' },
        { type: '内向', description: '你比较内敛，喜欢独处或与少数亲密朋友相处。' },
        { type: '中性', description: '你在社交和独处之间取得平衡，根据情境调整。' }
    ],
    emotional: [
        { type: '乐观', description: '你总是看到事情的积极一面，面对困难时保持乐观。' },
        { type: '沉稳', description: '你情绪稳定，面对压力和挑战时能够保持冷静。' },
        { type: '敏感', description: '你情感丰富，对周围环境和他人情绪变化比较敏感。' }
    ],
    interest: [
        { type: '文艺', description: '你对艺术和文化有着浓厚的兴趣，喜欢欣赏艺术。' },
        { type: '运动', description: '你热爱运动，喜欢户外活动，注重身体健康。' },
        { type: '美食', description: '你对美食有着浓厚的兴趣，喜欢尝试不同的食物。' }
    ]
};
function initEventListeners() {
    uploadPlaceholder.addEventListener('click', () => {
        fileInput.click();
    });
    fileInput.addEventListener('change', handleFileSelect);
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('drag-over');
    });
    uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('drag-over');
    });
    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('drag-over');
        if (e.dataTransfer.files.length > 0) {
            handleFile(e.dataTransfer.files[0]);
        }
    });
    removeImage.addEventListener('click', () => {
        uploadedImage = null;
        previewContainer.classList.add('hidden');
        uploadPlaceholder.classList.remove('hidden');
        analyzeButton.disabled = true;
        analyzeButton.classList.add('disabled');
    });
    analyzeButton.addEventListener('click', startAnalysis);
    downloadButton.addEventListener('click', () => {
        showToast('报告已下载');
    });
    reanalyzeButton.addEventListener('click', () => {
        reportPage.classList.remove('show');
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.classList.remove('show');
            card.style.transitionDelay = '0s';
        });
        setTimeout(() => {
            reportPage.classList.add('hidden');
            homepage.classList.remove('hidden');
        }, 500);
    });
    shareButton.addEventListener('click', () => {
        if (confirm('选择分享平台：\n1. 微信\n2. 朋友圈')) {
            showToast('分享链接已复制');
        }
    });
}
function handleFileSelect(e) {
    if (e.target.files.length > 0) {
        handleFile(e.target.files[0]);
    }
}
function handleFile(file) {
    if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (e) => {
            uploadedImage = e.target.result;
            previewImage.src = uploadedImage;
            previewContainer.classList.remove('hidden');
            uploadPlaceholder.classList.add('hidden');
            analyzeButton.disabled = false;
            analyzeButton.classList.remove('disabled');
        };
        reader.readAsDataURL(file);
    }
}
function startAnalysis() {
    analyzeButton.disabled = true;
    analyzeButton.textContent = '分析中...';
    analyzeButton.classList.add('loading');
    analyzeImageWithDoubao();
}
async function analyzeImageWithDoubao() {
    try {
        const apiKey = '405727b3-ea55-4b6e-b668-4bb7121230e4';
        const url = 'https://ark.cn-beijing.volces.com/api/v3/chat/completions';
        const requestData = {
            model: 'doubao-seed-1-8-251228',
            messages: [
                {
                    role: 'user',
                    content: [
                        {
                            type: 'text',
                            text: '请严格按照以下格式分析这张图片中人物的性格特征，每个项目字数限制30字以内：\n1. 社交倾向：[类型]，[描述]\n2. 情绪特质：[类型]，[描述]\n3. 兴趣偏好：[类型]，[描述]\n\n类型选择：\n- 社交倾向：外向/内向/中性\n- 情绪特质：乐观/沉稳/敏感\n- 兴趣偏好：文艺/运动/美食'
                        },
                        {
                            type: 'image_url',
                            image_url: {
                                url: uploadedImage
                            }
                        }
                    ]
                }
            ],
            temperature: 0.7,
            max_tokens: 200
        };
        const response = await fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify(requestData)
        });
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`API请求失败: ${response.status} - ${errorText}`);
        }
        const data = await response.json();
        parseAnalysisResult(data);
    } catch (error) {
        console.error('分析图片失败:', error);
        generateRandomResult();
    } finally {
        analyzeButton.classList.remove('loading');
        analyzeButton.textContent = '开始分析';
    }
}
function parseAnalysisResult(data) {
    try {
        const content = data.choices[0].message.content;
        
        const socialMatch = content.match(/社交倾向：([^，]+)，([^\n]+)/);
        const emotionalMatch = content.match(/情绪特质：([^，]+)，([^\n]+)/);
        const interestMatch = content.match(/兴趣偏好：([^，]+)，([^\n]+)/);
        if (socialMatch) {
            socialTendency.textContent = socialMatch[1];
            socialDescription.textContent = socialMatch[2].trim().substring(0, 30);
        } else {
            socialTendency.textContent = '中性';
            socialDescription.textContent = '在社交和独处之间取得平衡。';
        }
        if (emotionalMatch) {
            emotionalTrait.textContent = emotionalMatch[1];
            emotionalDescription.textContent = emotionalMatch[2].trim().substring(0, 30);
        } else {
            emotionalTrait.textContent = '沉稳';
            emotionalDescription.textContent = '情绪稳定，面对压力能保持冷静。';
        }
        if (interestMatch) {
            interestPreference.textContent = interestMatch[1];
            interestDescription.textContent = interestMatch[2].trim().substring(0, 30);
        } else {
            interestPreference.textContent = '文艺';
            interestDescription.textContent = '对艺术和文化有着浓厚的兴趣。';
        }
        showReportPage();
    } catch (error) {
        console.error('解析结果失败:', error);
        generateRandomResult();
    }
}
function generateRandomResult() {
    const socialIndex = Math.floor(Math.random() * personalityData.social.length);
    socialTendency.textContent = personalityData.social[socialIndex].type;
    socialDescription.textContent = personalityData.social[socialIndex].description.substring(0, 30);
    const emotionalIndex = Math.floor(Math.random() * personalityData.emotional.length);
    emotionalTrait.textContent = personalityData.emotional[emotionalIndex].type;
    emotionalDescription.textContent = personalityData.emotional[emotionalIndex].description.substring(0, 30);
    const interestIndex = Math.floor(Math.random() * personalityData.interest.length);
    interestPreference.textContent = personalityData.interest[interestIndex].type;
    interestDescription.textContent = personalityData.interest[interestIndex].description.substring(0, 30);
    showReportPage();
}
function showReportPage() {
    reportThumbnail.src = uploadedImage;
    homepage.classList.add('hidden');
    reportPage.classList.remove('hidden');
    setTimeout(() => {
        reportPage.classList.add('show');
    }, 100);
    
    const cards = document.querySelectorAll('.card');
    cards.forEach((card, index) => {
        setTimeout(() => {
            card.classList.add('show');
            card.style.transitionDelay = `${index * 0.2}s`;
        }, 300 + index * 150);
    });
}
function showToast(message) {
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => {
        toast.classList.remove('show');
    }, 2000);
}
function init() {
    initEventListeners();
    analyzeButton.disabled = true;
}
window.addEventListener('DOMContentLoaded', init);
    </script>
