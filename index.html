<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>秋雨 AI | 智能实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap');
        
        :root {
            --bg: #050505;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.2);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: #ffffff;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 沉浸式背景 */
        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        /* 玻璃拟态卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            transition: all 0.3s ease;
            overflow: hidden; /* 防止内容溢出重叠 */
            width: 100%;
        }

        .glass-card:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.05);
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 48px);
            max-width: 400px;
            height: 72px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 36px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 12px;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            flex: 1;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .nav-item.active .nav-dot {
            opacity: 1;
            transform: translateY(2px);
        }

        /* 渐变文字 - 响应式字号 */
        .text-hero {
            background: linear-gradient(to bottom right, #fff 50%, rgba(255,255,255,0.3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -0.05em;
            font-size: clamp(2.5rem, 10vw, 4rem);
            line-height: 1.1;
        }

        /* 按钮动画 */
        .btn-primary {
            background: var(--accent);
            color: white;
            padding: 16px 24px;
            border-radius: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 8px 20px var(--accent-glow);
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 内容区域适配 - 增加底部安全边距 */
        .content-area {
            padding: 40px 20px 180px 20px;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .prose {
            font-size: 15px;
            line-height: 1.7;
            color: rgba(255,255,255,0.7);
            word-break: break-word;
        }
        .prose strong { color: #fff; }
        .prose h1, .prose h2 { color: #fff; margin-top: 1.5em; font-weight: 700; }
        
        /* 视频容器比例修复 */
        .video-container {
            width: 100%;
            max-height: 60vh;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div class="ambient-bg"></div>

    <script type="module">
        import { GoogleGenAI } from 'https://esm.run/@google/genai';

        let GEMINI_API_KEY = "";
        
        async function fetchApiKey() {
            try {
                const response = await fetch('https://qiuyudata.oss-cn-guangzhou.aliyuncs.com/key.txt');
                if (response.ok) {
                    GEMINI_API_KEY = (await response.text()).trim();
                }
            } catch (e) {
                console.error('获取API Key失败:', e);
            }
        }
        
        fetchApiKey();

        const html = htm.bind(React.createElement);
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                home: html`<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>`,
                video: html`<path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/>`,
                user: html`<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>`,
                upload: html`<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/>`,
                sparkles: html`<path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/>`,
                download: html`<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>`
            };
            return html`
                <svg className=${className} width=${size} height=${size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    ${icons[name]}
                </svg>
            `;
        };

        const App = () => {
            const [path, setPath] = useState('home');

            return html`
                <div className="min-h-screen">
                    <main className="content-area">
                        ${path === 'home' && html`<${HomePage} setPath=${setPath} />`}
                        ${path === 'video' && html`<${VideoPage} />`}
                        ${path === 'user' && html`<${PersonalityPage} />`}
                    </main>

                    <nav className="bottom-nav">
                        ${['home', 'video', 'user'].map(p => {
                            const active = path === p;
                            return html`
                                <div key=${p} onClick=${() => { setPath(p); window.scrollTo(0,0); }} className=${`nav-item ${active ? 'active' : ''}`}>
                                    <${Icon} name=${p} size=${24} />
                                    <div className="nav-dot"></div>
                                </div>
                            `;
                        })}
                    </nav>
                </div>
            `;
        };

        const HomePage = ({ setPath }) => html`
            <div className="space-y-10">
                <header className="pt-10">
                    <h1 className="text-5xl text-hero mb-4">Hello,<br/>Explorer.</h1>
                    <p className="text-white/40 text-lg font-light">欢迎来到秋雨 AI 实验室</p>
                </header>

                <div className="grid gap-6">
                    <div onClick=${() => setPath('video')} className="glass-card p-8 flex items-center justify-between group">
                        <div className="space-y-2">
                            <h3 className="text-2xl font-bold">视频解析</h3>
                            <p className="text-white/30 text-sm">深度剖析视频内容与关键帧</p>
                        </div>
                        <div className="w-12 h-12 bg-indigo-500/20 rounded-2xl flex items-center justify-center text-indigo-400">
                            <${Icon} name="video" />
                        </div>
                    </div>

                    <div onClick=${() => setPath('user')} className="glass-card p-8 flex items-center justify-between group">
                        <div className="space-y-2">
                            <h3 className="text-2xl font-bold">人格洞察</h3>
                            <p className="text-white/30 text-sm">通过照片分析内在性格特质</p>
                        </div>
                        <div className="w-12 h-12 bg-purple-500/20 rounded-2xl flex items-center justify-center text-purple-400">
                            <${Icon} name="user" />
                        </div>
                    </div>
                </div>

                <div className="glass-card p-8 bg-indigo-500/10 border-indigo-500/20">
                    <div className="flex items-center gap-4 mb-4">
                        <div className="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center">
                            <${Icon} name="sparkles" size={20} />
                        </div>
                        <h4 className="font-bold">今日实验室动态</h4>
                    </div>
                    <p className="text-white/50 text-sm leading-relaxed">
                        我们升级了 Gemini 3 系列模型，现在视频解析的速度提升了 40%，且支持更复杂的逻辑推理。
                    </p>
                </div>
            </div>
        `;

        const VideoPage = () => {
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState("");
            const [error, setError] = useState("");

            const analyze = async () => {
                if (!GEMINI_API_KEY) { setError("请在源码中配置 API Key"); return; }
                setLoading(true); setError("");
                try {
                    const ai = new GoogleGenAI({ apiKey: GEMINI_API_KEY });
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = async () => {
                        const base64 = reader.result.split(",")[1];
                        const response = await ai.models.generateContent({
                            model: "gemini-3-flash-preview",
                            contents: [{
                                parts: [
                                    { text: "请详细分析这段视频并用中文总结。包括主要内容、氛围和关键点。" },
                                    { inlineData: { mimeType: file.type, data: base64 } }
                                ]
                            }]
                        });
                        setResult(response.text);
                        setLoading(false);
                    };
                } catch (e) { 
                    setError(e.message.includes("leaked") ? "API Key 已泄露被禁用" : e.message);
                    setLoading(false); 
                }
            };

            const downloadMD = () => {
                const blob = new Blob([result], { type: 'text/markdown' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `analysis_${Date.now()}.md`;
                a.click();
            };

            return html`
                <div className="space-y-10">
                    <header className="pt-10">
                        <h2 className="text-4xl text-hero mb-2">Video<br/>Intelligence.</h2>
                        <p className="text-white/40 text-sm font-light">上传视频，AI 将为您深度剖析每一帧</p>
                    </header>

                    <div className="glass-card p-8 space-y-6">
                        ${!file ? html`
                            <label className="flex flex-col items-center justify-center py-16 border-2 border-dashed border-white/5 rounded-[2rem] cursor-pointer hover:bg-white/5 transition-colors group">
                                <div className="w-16 h-16 bg-indigo-500/10 rounded-2xl flex items-center justify-center text-indigo-400 mb-6 group-hover:scale-110 transition-transform">
                                    <${Icon} name="upload" size={32} />
                                </div>
                                <span className="text-white/40 font-bold">选择视频文件</span>
                                <span className="text-white/10 text-xs mt-2 uppercase tracking-widest">MP4, MOV, AVI</span>
                                <input type="file" accept="video/*" className="hidden" onChange=${(e) => setFile(e.target.files[0])} />
                            </label>
                        ` : html`
                            <div className="space-y-6">
                                <div className="video-container shadow-2xl border border-white/5">
                                    <video src=${URL.createObjectURL(file)} controls className="w-full h-full object-contain" />
                                </div>
                                <div className="flex gap-3">
                                    <button onClick=${analyze} disabled=${loading} className="flex-grow btn-primary !py-4 !rounded-2xl text-sm">
                                        ${loading ? html`<div className="loader"></div>` : html`<${Icon} name="sparkles" size={18} />`}
                                        <span>${loading ? '正在解析...' : '开始深度分析'}</span>
                                    </button>
                                    <button onClick=${() => setFile(null)} className="px-5 glass-card border-white/10 flex items-center justify-center hover:bg-white/5">
                                        <${Icon} name="upload" size={18} className="text-white/40" />
                                    </button>
                                </div>
                            </div>
                        `}
                    </div>

                    ${(result || loading || error) && html`
                        <div className="glass-card p-8 space-y-8 animate-fade-up">
                            <div className="flex items-center justify-between border-b border-white/5 pb-6">
                                <div className="flex items-center gap-3">
                                    <div className="w-1.5 h-6 bg-indigo-500 rounded-full"></div>
                                    <h3 className="text-xl font-bold">解析报告</h3>
                                </div>
                                ${result && !loading && html`
                                    <button onClick=${downloadMD} className="px-4 py-2 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-[10px] font-black uppercase tracking-widest text-indigo-400 flex items-center gap-2 transition-all">
                                        <${Icon} name="download" size={12} /> 下载 MD
                                    </button>
                                `}
                            </div>
                            
                            <div className="min-h-[200px]">
                                ${error ? html`<div className="p-6 bg-red-500/5 border border-red-500/10 rounded-2xl text-red-400 text-sm font-medium">${error}</div>` :
                                  loading ? html`<div className="flex flex-col items-center py-20 space-y-6 text-white/20"><div className="loader !w-12 !h-12 !border-4"></div><p className="text-sm font-bold tracking-widest uppercase">AI 正在重构视觉逻辑...</p></div>` :
                                  html`<div className="prose prose-invert max-w-none" dangerouslySetInnerHTML=${{ __html: marked.parse(result) }} />`}
                            </div>
                        </div>
                    `}
                </div>
            `;
        };

        const PersonalityPage = () => {
            const [img, setImg] = useState(null);
            const [loading, setLoading] = useState(false);
            const [res, setRes] = useState(null);
            const [error, setError] = useState("");

            const analyze = async () => {
                if (!GEMINI_API_KEY) { setError("请配置 API Key"); return; }
                setLoading(true); setError("");
                try {
                    const ai = new GoogleGenAI({ apiKey: GEMINI_API_KEY });
                    const base64 = img.split(",")[1];
                    const mime = img.split(";")[0].split(":")[1];
                    const response = await ai.models.generateContent({
                        model: "gemini-3-flash-preview",
                        contents: [{
                            parts: [
                                { text: "分析图片人物性格。严格返回 JSON: { social: { type, description }, emotional: { type, description }, interest: { type, description } }。请用中文回答。" },
                                { inlineData: { mimeType: mime, data: base64 } }
                            ]
                        }]
                    });
                    const json = JSON.parse(response.text.match(/\{[\s\S]*\}/)[0]);
                    setRes(json);
                } catch (e) { setError(e.message); } finally { setLoading(false); }
            };

            return html`
                <div className="space-y-10">
                    <header className="pt-10">
                        <h2 className="text-4xl text-hero mb-2">Soul<br/>Insight.</h2>
                        <p className="text-white/40 text-sm font-light">透过视觉特征，洞察隐藏在表象下的灵魂特质</p>
                    </header>

                    <div className="glass-card p-8 space-y-8">
                        <div className="w-full max-w-[280px] mx-auto aspect-square glass-card border-dashed border-white/5 flex flex-col items-center justify-center overflow-hidden cursor-pointer hover:bg-white/5 transition-all group" onClick=${() => document.getElementById('img-in').click()}>
                            ${img ? html`<img src=${img} className="w-full h-full object-cover" />` : html`
                                <div className="text-white/10 group-hover:text-purple-400 transition-colors flex flex-col items-center">
                                    <${Icon} name="user" size={48} />
                                    <span className="mt-4 text-xs font-black uppercase tracking-widest">上传人像照片</span>
                                </div>
                            `}
                        </div>
                        <input id="img-in" type="file" accept="image/*" className="hidden" onChange=${(e) => { const r = new FileReader(); r.onload = (ev) => setImg(ev.target.result); r.readAsDataURL(e.target.files[0]); }} />
                        
                        <div className="max-w-xs mx-auto w-full">
                            <button onClick=${analyze} disabled=${!img || loading} className="btn-primary !py-4 !rounded-2xl text-sm">
                                ${loading ? html`<div className="loader"></div>` : html`<${Icon} name="sparkles" size={18} />`}
                                <span>${loading ? '正在洞察灵魂...' : '开始人格分析'}</span>
                            </button>
                            ${error && html`<p className="text-red-400 text-center mt-4 text-xs font-bold">${error}</p>`}
                        </div>
                    </div>

                    ${res && html`
                        <div className="space-y-6 animate-fade-up">
                            <div className="flex items-center gap-3 px-2">
                                <div className="w-1.5 h-6 bg-purple-500 rounded-full"></div>
                                <h3 className="text-xl font-bold">洞察报告</h3>
                            </div>
                            <div className="grid gap-4">
                                ${Object.entries(res).map(([key, val]) => {
                                    const icons = { social: 'user', emotional: 'sparkles', interest: 'video' };
                                    const titles = { social: '社交倾向', emotional: '情绪特质', interest: '兴趣偏好' };
                                    const colors = { social: 'text-indigo-400', emotional: 'text-fuchsia-400', interest: 'text-purple-400' };
                                    return html`
                                        <div key=${key} className="glass-card p-8 space-y-4">
                                            <div className="flex items-center gap-3 text-white/20 text-[10px] font-black uppercase tracking-[0.2em]">
                                                <${Icon} name=${icons[key]} size={12} />
                                                <span>${titles[key]}</span>
                                            </div>
                                            <div className=${`text-2xl font-black ${colors[key]}`}>${val.type}</div>
                                            <p className="text-white/40 text-sm leading-relaxed font-light">${val.description}</p>
                                        </div>
                                    `;
                                })}
                            </div>
                            <button onClick=${() => { setRes(null); setImg(null); }} className="mx-auto block px-8 py-3 glass-card border-white/10 text-xs font-bold text-white/20 hover:text-white/40 transition-all">重新分析</button>
                        </div>
                    `}
                </div>
            `;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
